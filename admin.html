<table border="1" id="table"></table>

<script>
fetch("PASTE_CSV_LINK")
.then(r=>r.text())
.then(d=>{
  let rows = d.split("\n");
  let html="";

  rows.forEach(r=>{
    html += "<tr>";
    r.split(",").forEach(c=>{
      html += "<td>"+c+"</td>";
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
});
</script>
