<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; padding:10px;}
.card {background:#f4f4f4; padding:10px; margin:10px 0;}
button {margin-top:5px;}
</style>
</head>

<body>

<h2>📊 Admin Panel</h2>

<div id="list"></div>

<script>

async function loadData(){

let res = await fetch("https://script.google.com/macros/s/AKfycbzo4OqvEvhDCgvPAx2MycMwMwBvZ48ZatRnlT1sjBH9QgEURkhipDGWfH0_lKvKgns2/exec");
let data = await res.json();

let html="";

data.reverse().forEach((d,i)=>{

html+=`
<div class="card">
<b>${d.name}</b><br>
📞 ${d.phone}<br>
🏥 ${d.clinic}<br>
📅 ${d.date}<br>
⏰ ${d.time}<br>
Status: ${d.status}
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

loadData();

</script>

</body>
</html>
