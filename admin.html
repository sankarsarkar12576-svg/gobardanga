<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f4f8fb;padding:10px;}

.card{
padding:12px;
margin:10px 0;
border-radius:10px;
color:white;
}

.green{background:#28a745;}
.red{background:#dc3545;}
</style>
</head>

<body>

<h2>📊 Appointment List</h2>

<div id="list"></div>

<script>

const URL="https://script.google.com/macros/s/XXXXX/exec";

async function load(){

let res=await fetch(URL);
let data=await res.json();

let html="";

data.reverse().forEach(d=>{

let cls = d.status==="PAST" ? "red" : "green";

html+=`
<div class="card ${cls}">
<b>${d.token}</b><br>
${d.name}<br>
📞 ${d.phone}<br>
🏥 ${d.clinic}<br>
📅 ${d.date}<br>
⏰ ${d.time}
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

load();

</script>

</body>
</html>
