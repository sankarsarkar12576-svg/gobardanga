<table border="1" id="table"></table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRfBRhpH8GJ6nEI37nO03kEAkU7ozkdiS-pv-bhclOJIjETU0N-ruHKlsgd2K9D5ueiUJhkb9v3e98y/pubhtml")
.then(r=>r.text())
.then(d=>{
  let rows = d.split("\n");
  let html="";

  rows.forEach(r=>{
    html += "<tr>";
    r.split(",").forEach(c=>{
      html += "<td>"+c+"</td>";
    });
    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
});
</script>
