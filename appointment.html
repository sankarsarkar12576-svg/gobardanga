<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background:#eef3ff;
  margin:0;
}

.card {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* time buttons */
.time-box{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.time{
  flex:1 0 45%;
  text-align:center;
  padding:10px;
  border:1px solid #0d6efd;
  border-radius:8px;
  cursor:pointer;
}

.selected{
  background:#0d6efd;
  color:white;
}

button {
  width:100%;
  padding:14px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Book Appointment</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic">
<option value="">Select Clinic</option>
<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
<option value="t1">German Clinic</option>
</select>

<select id="date"></select>

<div id="timeBox" class="time-box"></div>

<button onclick="confirmBooking()">Book Appointment</button>

</div>

<script>

let selectedTime="";

/* load 7 days */
function loadDates(){
let d=new Date();
let html="<option value=''>Select Date</option>";

for(let i=0;i<7;i++){
let nd=new Date();
nd.setDate(d.getDate()+i);

let val=nd.toISOString().split("T")[0];
let text=nd.toDateString();

html+=`<option value="${val}">${text}</option>`;
}

document.getElementById("date").innerHTML=html;
}
loadDates();

/* clinic time */
const clinicTime={
g1:["8:00 AM","9:00 AM","5:00 PM","6:00 PM"],
g2:["10:00 AM","11:00 AM","2:00 PM","3:00 PM"],
t1:["10:00 AM","11:00 AM"]
};

/* show time */
document.getElementById("clinic").addEventListener("change",function(){

let clinic=this.value;
let times=clinicTime[clinic]||[];

let html="";

times.forEach(t=>{
html+=`<div class="time" onclick="selectTime(this,'${t}')">${t}</div>`;
});

document.getElementById("timeBox").innerHTML=html;

});

/* select */
function selectTime(el,time){

document.querySelectorAll(".time").forEach(t=>t.classList.remove("selected"));

el.classList.add("selected");
selectedTime=time;
}

/* token */
function generateToken(name,time){
let first=name.charAt(0).toUpperCase();
let serial=Math.floor(Math.random()*900+100);
return first+serial+time.replace(":","").replace(" ","");
}

/* booking */
function confirmBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;
let date=document.getElementById("date").value;

if(!name||!phone||!clinic||!date||!selectedTime){
alert("সব তথ্য পূরণ করুন ❌");
return;
}

let token=generateToken(name,selectedTime);

/* redirect */
window.location.href="token.html?token="+token+
"&name="+name+
"&time="+selectedTime+
"&date="+date;

}

</script>

</body>
</html>
