<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; padding:15px; background:#f4f8fb;}
.card {background:white; padding:15px; border-radius:10px;}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
}

.day {
  margin:10px 0;
  padding:10px;
  background:#eef3ff;
  border-radius:8px;
}

.slot {
  display:inline-block;
  padding:6px 10px;
  margin:5px;
  border:1px solid #0d6efd;
  cursor:pointer;
  border-radius:6px;
}

.selected {background:#0d6efd;color:white;}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:10px;
}
  .booked {
  background: #dc3545;
  color: white;
  border: 1px solid #dc3545;
  cursor: not-allowed;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Book Appointment</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic">
<option value="">Select Clinic</option>

<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
<option value="tarunipur">Tarunipur (Monday)</option>
<option value="bithari">Bithari</option>
<option value="aajat">Aajat Pharmacy</option>
<option value="katiya">Katiya Hat</option>
<option value="basirhat">Basirhat</option>
<option value="t1">German Clinic (Tuesday)</option>
<option value="t2">New German (Tuesday)</option>
<option value="th1">Dharampur (Thursday)</option>
<option value="th2">Nagoruchra (Thursday)</option>
<option value="sat1">Banga Clinic (Saturday)</option>
<option value="sat2">Chakrabarty Hall (Saturday)</option>

</select>

<button onclick="generate()">Show Available Time</button>

<div id="days"></div>

<button onclick="confirmBooking()">✅ Book Appointment</button>

</div>

<script>
let selectedDate="", selectedTime="";
    let bookedSlots = [];
{
  let res = await fetch("https://script.google.com/macros/s/AKfycbwEE-f5MvTx1nFeK064fPr5tprVejsS5nWz4s2nE3XFipFdlxDUlu4ihV_BmIkSAeYB/exec");
bookedSlots = await res.json();

}

loadBooked();

/* clinic rules */
const clinicData = {

g1:{days:[1,2,3,4,5,6], start:8, end:10},
g2:{days:[1,2,3,4,5,6], start:10, end:12},

tarunipur:{days:[1], start:8, end:11},

bithari:{days:[0,1,2,3,4,5,6], start:12, end:14},
aajat:{days:[0,1,2,3,4,5,6], start:15, end:16},
katiya:{days:[0,1,2,3,4,5,6], start:17, end:19},
basirhat:{days:[0,1,2,3,4,5,6], start:19, end:21},

t1:{days:[2], start:10, end:12},
t2:{days:[2], start:12, end:14},

th1:{days:[4], start:11, end:12},
th2:{days:[4], start:12, end:14},

sat1:{days:[6], start:10, end:13},
sat2:{days:[6], start:10, end:13}

};

/* generate */
function generate(){

let clinic=document.getElementById("clinic").value;

if(!clinic){
alert("Select clinic first ❌");
return;
}

let rules = clinicData[clinic];

if(!rules){
alert("Clinic error ❌");
return;
}

let today=new Date();
let html="";

for(let i=0;i<7;i++){

let d=new Date();
d.setDate(today.getDate()+i);

let day=d.getDay();

if(rules.days.indexOf(day) === -1) continue;

let dateStr=d.toISOString().split("T")[0];

html += "<div class='day'><b>"+d.toDateString()+"</b><br>";

for(let h=rules.start;h<rules.end;h++){
for(let m=0;m<60;m+=10){

let hour=h>12?h-12:h;
let ampm=h>=12?"PM":"AM";
let min=m<10?"0"+m:m;

let time=hour+":"+min+" "+ampm;

html += "<span class='slot' onclick=\"selectSlot(this,'"+dateStr+"','"+time+"')\">"+time+"</span>";
}
}

html += "</div>";
}

document.getElementById("days").innerHTML = html;
}
  let isBooked = bookedSlots.find(b =>
  b.clinic === clinic &&
  b.date === dateStr &&
  b.time === time
);

if(isBooked){
  html += `<span class='slot booked'>${time}</span>`;
}else{
  html += `<span class='slot' onclick="selectSlot(this,'${dateStr}','${time}')">${time}</span>`;
}

/* select */
function selectSlot(el,date,time){

let all=document.getElementsByClassName("slot");
for(let i=0;i<all.length;i++){
all[i].classList.remove("selected");
}

el.classList.add("selected");

selectedDate=date;
selectedTime=time;
}

/* booking */
/* booking */
async function confirmBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;

if(!name || !phone || !clinic || !selectedDate || !selectedTime){
alert("Fill all details ❌");
return;
}

try{

await fetch("https://script.google.com/macros/s/AKfycbwEE-f5MvTx1nFeK064fPr5tprVejsS5nWz4s2nE3XFipFdlxDUlu4ihV_BmIkSAeYB/exec", {
  method:"POST",
  mode: "no-cors",
  body: JSON.stringify({
    name: name,
    phone: phone,
    clinic: clinic,
    date: selectedDate,
    time: selectedTime
  })
});

alert(
"Booked Successfully ✅\n\n"+
"Name: "+name+"\n"+
"Phone: "+phone+"\n"+
"Date: "+selectedDate+"\n"+
"Time: "+selectedTime
);

}catch(e){
alert("Error saving booking ❌");
console.log(e);
}

}

</script>

</body>
</html>
