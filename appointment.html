<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

/* 🔷 Header */
.header{
  display:flex;
  align-items:center;
  padding:12px;
  background:#0d6efd;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.back-btn{
  margin-right:10px;
  font-size:20px;
  cursor:pointer;
}

/* 🔷 Card */
.container{
  padding:12px;
}

.card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* 🔷 Inputs */
input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:15px;
}

/* 🔷 Date box */
.day{
  padding:12px;
  margin:8px 0;
  background:#eef3ff;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.day:hover{
  background:#dbe7ff;
}

.selected{
  background:#0d6efd;
  color:white;
}

/* 🔷 Button */
button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#0d6efd;
  color:white;
  font-size:16px;
  font-weight:bold;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

/* 🔷 Small text */
.title{
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- 🔷 HEADER -->
<div class="header">
  <span class="back-btn" onclick="goBack()">⬅</span>
  Book Appointment
</div>

<div class="container">

<div class="card">

<div class="title">Patient Details</div>

<input id="name" placeholder="Enter your name">
<input id="phone" placeholder="Enter phone number">

<div class="title">Select Clinic</div>

<select id="clinic" onchange="generate()">
<option value="">Choose clinic</option>

<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
<option value="tarunipur">Tarunipur</option>
<option value="bithari">Bithari</option>
<option value="aajat">Aajat Pharmacy</option>
<option value="katiya">Katiya Hat</option>
<option value="basirhat">Basirhat</option>
<option value="t1">German Clinic</option>
<option value="t2">New German</option>
<option value="th1">Dharampur</option>
<option value="th2">Nagoruchra</option>
<option value="sat1">Banga Clinic</option>
<option value="sat2">Chakrabarty Hall</option>

</select>

<div class="title">Select Date</div>
<div id="days"></div>

<button onclick="book()">Confirm Booking</button>

</div>

</div>

<script>

let selectedDate="";

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxETVvjdd23rqhzGShZ0zbr6tRx5ryRrTQp4aLdftG1yUJbxCnldYHEWFxhn71hcPi9Lg/exec";

const clinicData={
g1:{days:[1,2,3,4,5,6]},
g2:{days:[1,2,3,4,5,6]},
tarunipur:{days:[1]},
bithari:{days:[0,1,2,3,4,5,6]},
aajat:{days:[0,1,2,3,4,5,6]},
katiya:{days:[0,1,2,3,4,5,6]},
basirhat:{days:[0,1,2,3,4,5,6]},
t1:{days:[2]},
t2:{days:[2]},
th1:{days:[4]},
th2:{days:[4]},
sat1:{days:[6]},
sat2:{days:[6]}
};

function generate(){

let clinic=document.getElementById("clinic").value;
if(!clinic) return;

let rules=clinicData[clinic];
let today=new Date();
let html="";

for(let i=0;i<7;i++){

let d=new Date();
d.setDate(today.getDate()+i);

if(!rules.days.includes(d.getDay())) continue;

let dateStr=d.toISOString().split("T")[0];

html+=`<div class="day" onclick="selectDate(this,'${dateStr}')">
${d.toDateString()}
</div>`;
}

document.getElementById("days").innerHTML=html;
}

function selectDate(el,date){
document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
el.classList.add("selected");
selectedDate=date;
}

async function book(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;

if(!name||!phone||!clinic||!selectedDate){
alert("Fill all details");
return;
}

let res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({name,phone,clinic,date:selectedDate})
});

let text=await res.text();

alert("✅ Booking Confirmed\n"+text);
}

function goBack(){
history.back();
}

</script>

</body>
</html>
