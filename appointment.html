<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; padding:15px; background:#f4f8fb;}
.card {background:white; padding:15px; border-radius:10px;}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
}

.slot {
  display:inline-block;
  padding:6px 10px;
  margin:5px;
  border:1px solid #0d6efd;
  cursor:pointer;
  border-radius:6px;
}

.selected {background:#0d6efd;color:white;}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:10px;
}

.booked {
  background:red;
  color:white;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Book Appointment</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic">
<option value="">Select Clinic</option>
<option value="g1">Gobardanga</option>
<option value="g2">Prosanna Gang</option>
<option value="t1">Tuesday Clinic</option>
</select>

<button onclick="generate()">Show Time</button>

<div id="days"></div>

<button onclick="confirmBooking()">✅ Book Appointment</button>

</div>

<script>

let selectedDate="", selectedTime="";
let bookedSlots=[];

/* load booked */
async function loadBooked(){
let res = await fetch("YOUR_SCRIPT_URL");
bookedSlots = await res.json();
}
loadBooked();

/* simple slots */
function generate(){

let clinic=document.getElementById("clinic").value;

let today=new Date();
let html="";

for(let i=0;i<7;i++){

let d=new Date();
d.setDate(today.getDate()+i);

let dateStr=d.toISOString().split("T")[0];

html += "<div><b>"+d.toDateString()+"</b><br>";

for(let h=8;h<10;h++){
for(let m=0;m<60;m+=10){

let time=h+":"+ (m<10?"0"+m:m);

let isBooked = bookedSlots.find(b =>
b.clinic==clinic && b.date==dateStr && b.time==time
);

if(isBooked){
html+=`<span class='slot booked'>${time}</span>`;
}else{
html+=`<span class='slot' onclick="selectSlot(this,'${dateStr}','${time}')">${time}</span>`;
}

}
}

html+="</div>";
}

document.getElementById("days").innerHTML=html;
}

/* select */
function selectSlot(el,date,time){

document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));

el.classList.add("selected");

selectedDate=date;
selectedTime=time;
}

/* token generator */
function generateToken(name,time){

let first = name.charAt(0).toUpperCase();
let serial = Math.floor(Math.random()*900+100);

return first + serial + time.replace(":","");
}

/* booking */
async function confirmBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;

if(!name || !phone || !clinic || !selectedDate || !selectedTime){
alert("Fill all ❌");
return;
}

/* token */
let token = generateToken(name,selectedTime);

/* save */
await fetch("YOUR_SCRIPT_URL",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name,phone,clinic,
date:selectedDate,
time:selectedTime,
token:token
})
});

/* redirect */
window.location.href="token.html?token="+token+
"&name="+name+
"&time="+selectedTime+
"&date="+selectedDate;

}

</script>

</body>
</html>
