<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef2f7;
}

/* 🔷 Header */
.header{
display:flex;
align-items:center;
padding:14px;
background:#0d6efd;
color:white;
font-size:18px;
font-weight:600;
position:sticky;
top:0;
}

.back-btn{
margin-right:12px;
font-size:22px;
cursor:pointer;
}

/* 🔷 Container */
.container{
padding:12px;
max-width:500px;
margin:auto;
}

/* 🔷 Card */
.card{
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* 🔷 Title */
.title{
font-size:14px;
font-weight:600;
color:#444;
margin-top:10px;
}

/* 🔷 Inputs */
input,select{
width:100%;
padding:13px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
outline:none;
}

input:focus,select:focus{
border-color:#0d6efd;
box-shadow:0 0 0 2px rgba(13,110,253,0.1);
}

/* 🔷 Date list */
.day{
padding:14px;
margin:8px 0;
background:#f1f5ff;
border-radius:12px;
cursor:pointer;
transition:0.2s;
font-size:14px;
}

.day:active{
transform:scale(0.98);
}

.selected{
background:#0d6efd;
color:white;
}

/* 🔷 Button */
button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0d6efd,#3a8bfd);
color:white;
font-size:16px;
font-weight:600;
box-shadow:0 4px 10px rgba(13,110,253,0.3);
}

button:active{
transform:scale(0.98);
}
</style>
</head>

<body>

<!-- 🔷 HEADER -->
<div class="header">
<span class="back-btn" onclick="goBack()">⬅</span>
Book Appointment
</div>

<div class="container">
<div class="card">

<div class="title">Patient Details</div>

<input id="name" placeholder="Enter your name">
<input id="phone" placeholder="Enter phone number">

<div class="title">Select Clinic</div>

<select id="clinic" onchange="generate()">
<option value="">Choose clinic</option>

<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
<option value="tarunipur">Tarunipur</option>
<option value="bithari">Bithari</option>
<option value="aajat">Aajat Pharmacy</option>
<option value="katiya">Katiya Hat</option>
<option value="basirhat">Basirhat</option>
<option value="t1">German Clinic</option>
<option value="t2">New German</option>
<option value="th1">Dharampur</option>
<option value="th2">Nagoruchra</option>
<option value="sat1">Banga Clinic</option>
<option value="sat2">Chakrabarty Hall</option>
</select>

<div class="title">Select Date</div>
<div id="days"></div>

<button onclick="book()">Confirm Booking</button>

</div>
</div>

<script>

let selectedDate="";

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxETVvjdd23rqhzGShZ0zbr6tRx5ryRrTQp4aLdftG1yUJbxCnldYHEWFxhn71hcPi9Lg/exec";

const clinicData={
g1:[1,2,3,4,5,6],
g2:[1,2,3,4,5,6],
tarunipur:[1],
bithari:[0,1,2,3,4,5,6],
aajat:[0,1,2,3,4,5,6],
katiya:[0,1,2,3,4,5,6],
basirhat:[0,1,2,3,4,5,6],
t1:[2],
t2:[2],
th1:[4],
th2:[4],
sat1:[6],
sat2:[6]
};

function generate(){
let clinic=document.getElementById("clinic").value;
if(!clinic) return;

let rules=clinicData[clinic];
let today=new Date();
let html="";

for(let i=0;i<7;i++){
let d=new Date();
d.setDate(today.getDate()+i);

if(!rules.includes(d.getDay())) continue;

let ds=d.toISOString().split("T")[0];

html+=`<div class="day" onclick="selectDate(this,'${ds}')">
${d.toDateString()}
</div>`;
}

document.getElementById("days").innerHTML=html;
}

function selectDate(el,date){
document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
el.classList.add("selected");
selectedDate=date;
}

async function book(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let clinic=document.getElementById("clinic").value;

if(!name||!phone||!clinic||!selectedDate){
alert("Fill all details ❌");
return;
}

let res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({name,phone,clinic,date:selectedDate})
});

let data=await res.json();

localStorage.setItem("tokenData", JSON.stringify({
name,phone,clinic,date:selectedDate,time:data.time,token:data.token
}));

window.location.href="token.html";
}

function goBack(){
history.back();
}

</script>

</body>
</html>
