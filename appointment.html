<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;padding:10px;background:#f4f8fb;}
.card{background:white;padding:15px;border-radius:12px;max-width:500px;margin:auto;}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;}
.day{padding:10px;margin:8px 0;background:#eef3ff;border-radius:10px;cursor:pointer;}
.selected{background:#0d6efd;color:white;}
</style>
</head>

<body>

<div class="card">

<button onclick="history.back()">⬅ Back</button>

<h2>📅 Select Date</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic" onchange="generate()">
<option value="">Select Clinic</option>

<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
<option value="tarunipur">Tarunipur (Monday)</option>
<option value="bithari">Bithari</option>
<option value="aajat">Aajat Pharmacy</option>
<option value="katiya">Katiya Hat</option>
<option value="basirhat">Basirhat</option>
<option value="t1">German Clinic (Tuesday)</option>
<option value="t2">New German (Tuesday)</option>
<option value="th1">Dharampur (Thursday)</option>
<option value="th2">Nagoruchra (Thursday)</option>
<option value="sat1">Banga Clinic (Saturday)</option>
<option value="sat2">Chakrabarty Hall (Saturday)</option>

</select>

<div id="days"></div>

<button onclick="book()">✅ Confirm Booking</button>

</div>

<script>

let selectedDate="";

const SCRIPT_URL="https://script.google.com/macros/s/XXXXX/exec";

/* ✅ ALL CLINIC START TIME */
const clinicData={
g1:{days:[1,2,3,4,5,6],start:8},
g2:{days:[1,2,3,4,5,6],start:10},

tarunipur:{days:[1],start:8},

bithari:{days:[0,1,2,3,4,5,6],start:12},
aajat:{days:[0,1,2,3,4,5,6],start:15},
katiya:{days:[0,1,2,3,4,5,6],start:17},
basirhat:{days:[0,1,2,3,4,5,6],start:19},

t1:{days:[2],start:10},
t2:{days:[2],start:12},

th1:{days:[4],start:11},
th2:{days:[4],start:12},

sat1:{days:[6],start:10},
sat2:{days:[6],start:10}
};

// generate next 7 days
function generate(){

let clinic=document.getElementById("clinic").value;
if(!clinic) return;

let rules=clinicData[clinic];
let today=new Date();
let html="";

for(let i=0;i<7;i++){

let d=new Date();
d.setDate(today.getDate()+i);

if(!rules.days.includes(d.getDay())) continue;

let dateStr=d.toISOString().split("T")[0];

html+=`<div class="day" onclick="selectDate(this,'${dateStr}')">${d.toDateString()}</div>`;
}

document.getElementById("days").innerHTML=html;
}

// select date
function selectDate(el,date){
document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
el.classList.add("selected");
selectedDate=date;
}

// booking
async function book(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;

if(!name||!phone||!clinic||!selectedDate){
alert("Fill all details");
return;
}

let res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({name,phone,clinic,date:selectedDate})
});

let text=await res.text();

alert("✅ Booking Confirmed\n"+text);
}

</script>

</body>
</html>
