<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family: Arial; background:#eef3ff; margin:0;}

.card {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{text-align:center;}

input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Book Appointment</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic">
<option value="">Select Clinic</option>
<option value="g1">Gobardanga</option>
<option value="g2">Prosanna Gang</option>
<option value="t1">German Clinic</option>
</select>

<select id="date"></select>

<button onclick="confirmBooking()">Book Appointment</button>

</div>

<script>

/* load 7 days */
function loadDates(){
let d=new Date();
let html="<option value=''>Select Date</option>";

for(let i=0;i<7;i++){
let nd=new Date();
nd.setDate(d.getDate()+i);

let val=nd.toISOString().split("T")[0];
let text=nd.toDateString();

html+=`<option value="${val}">${text}</option>`;
}

document.getElementById("date").innerHTML=html;
}
loadDates();

/* clinic start time */
const clinicStart={
g1:"08:00",
g2:"10:00",
t1:"11:00"
};

/* convert time */
function addMinutes(time, mins){

let [h,m]=time.split(":").map(Number);

let total=h*60+m+mins;

let nh=Math.floor(total/60);
let nm=total%60;

let ampm=nh>=12?"PM":"AM";

nh = nh>12?nh-12:nh;
if(nh==0) nh=12;

return nh+":"+(nm<10?"0"+nm:nm)+" "+ampm;
}

/* booking */
function confirmBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;
let date=document.getElementById("date").value;

if(!name||!phone||!clinic||!date){
alert("সব তথ্য পূরণ করুন ❌");
return;
}

/* serial (simple random now) */
let serial=Math.floor(Math.random()*50);

/* start time */
let start=clinicStart[clinic];

/* auto time */
let time=addMinutes(start, serial*7);

/* token */
let token=name.charAt(0).toUpperCase()+serial;

/* redirect */
window.location.href="token.html?token="+token+
"&name="+name+
"&time="+time+
"&date="+date;

}

</script>

</body>
</html>
