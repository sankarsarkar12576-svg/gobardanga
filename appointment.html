<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background: #f4f8fb;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  max-width: 480px;
  margin: auto;
}

h2 { text-align: center; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 10px;
}

.day {
  margin-top: 12px;
  padding: 10px;
  background: #eef3ff;
  border-radius: 10px;
  display: flex;
  flex-wrap: wrap;
}

.slot {
  padding: 8px 10px;
  margin: 4px;
  border: 1px solid #0d6efd;
  border-radius: 8px;
  font-size: 13px;
}

.selected {
  background: #0d6efd;
  color: white;
}

.booked {
  background: #dc3545;
  color: white;
  border: 1px solid #dc3545;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Book Appointment</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="clinic">
<option value="">Select Clinic</option>
<option value="g1">Gobardanga Polyclinic</option>
<option value="g2">Prosanna Gang Clinic</option>
</select>

<button onclick="generate()">Show Time</button>

<div id="days"></div>

<button onclick="confirmBooking()">✅ Book</button>

</div>

<script>

let selectedDate="", selectedTime="";
let bookedSlots=[];

// 👉 CHANGE THIS URL
const SCRIPT_URL = "https://script.google.com/macros/s/XXXXX/exec";

const clinicData = {
g1:{days:[1,2,3,4,5,6], start:8, end:10},
g2:{days:[1,2,3,4,5,6], start:10, end:12}
};

// load booked slots
async function loadBooked(){
let res = await fetch(SCRIPT_URL);
bookedSlots = await res.json();
}

// generate slots
async function generate(){

await loadBooked();

let clinic=document.getElementById("clinic").value;
if(!clinic){ alert("Select clinic"); return; }

let rules=clinicData[clinic];
let today=new Date();
let html="";

for(let i=0;i<5;i++){

let d=new Date();
d.setDate(today.getDate()+i);

let day=d.getDay();
if(rules.days.indexOf(day)===-1) continue;

let dateStr=d.toISOString().split("T")[0];

html += "<div class='day'><b>"+d.toDateString()+"</b><br>";

for(let h=rules.start;h<rules.end;h++){
for(let m=0;m<60;m+=10){

let hour=h>12?h-12:h;
let ampm=h>=12?"PM":"AM";
let min=m<10?"0"+m:m;
let time=hour+":"+min+" "+ampm;

let isBooked = bookedSlots.some(b =>
  b.clinic === clinic &&
  b.date === dateStr &&
  b.time === time
);

if(isBooked){
html += `<span class='slot booked'>${time}</span>`;
}else{
html += `<span class='slot' onclick="selectSlot(this,'${dateStr}','${time}')">${time}</span>`;
}

}
}

html += "</div>";
}

document.getElementById("days").innerHTML=html;
}

// select slot
function selectSlot(el,date,time){
document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"));
el.classList.add("selected");
selectedDate=date;
selectedTime=time;
}

// booking
async function confirmBooking(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let clinic=document.getElementById("clinic").value;

if(!name||!phone||!clinic||!selectedDate||!selectedTime){
alert("Fill all details");
return;
}

await fetch(SCRIPT_URL,{
method:"POST",
body: JSON.stringify({name,phone,clinic,date:selectedDate,time:selectedTime})
});

alert("Booking Successful ✅");
generate(); // refresh slots
}

</script>

</body>
</html>
