<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:90%;
max-width:350px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

.header{
padding:15px;
color:white;
text-align:center;
font-size:18px;
font-weight:bold;
}

.green{background:#28a745;}
.red{background:#dc3545;}

.body{padding:20px;text-align:center;}

.token{
font-size:45px;
font-weight:bold;
color:#0d6efd;
margin:10px 0;
}

.info{text-align:left;font-size:14px;margin-top:10px;}
.info div{margin:6px 0;}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<div id="statusBar" class="header">Token</div>

<div class="body">

<div class="token" id="token"></div>

<div class="info">
<div><b>Name:</b> <span id="name"></span></div>
<div><b>Phone:</b> <span id="phone"></span></div>
<div><b>Clinic:</b> <span id="clinic"></span></div>
<div><b>Date:</b> <span id="date"></span></div>
<div><b>Time:</b> <span id="time"></span></div>
</div>

<button onclick="goHome()">⬅ Back</button>

</div>

</div>

<script>

let p=new URLSearchParams(window.location.search);

let token=p.get("token");

// ❌ No data case
if(!token){
document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;">
<div style="background:white;padding:25px;border-radius:12px;text-align:center;">
<h2 style="color:red;">No Active Token</h2>
<button onclick="goHome()">Go Booking</button>
</div>
</div>`;
throw new Error("No data");
}

// ✅ Set data
let name=p.get("name");
let phone=p.get("phone");
let clinic=p.get("clinic");
let date=p.get("date");
let time=p.get("time");

document.getElementById("token").innerText=token;
document.getElementById("name").innerText=name;
document.getElementById("phone").innerText=phone;
document.getElementById("clinic").innerText=clinic;
document.getElementById("date").innerText=date;
document.getElementById("time").innerText=time;

// 🔥 Status color
let today=new Date();
let d=new Date(date);

let bar=document.getElementById("statusBar");

if(d < today){
bar.classList.add("red");
bar.innerText="❌ Expired Token";
}else{
bar.classList.add("green");
bar.innerText="✅ Active Token";
}

function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
