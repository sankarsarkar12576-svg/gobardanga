<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:Arial;text-align:center;padding:20px;background:#f4f8fb;}
.card {background:white;padding:20px;border-radius:10px;}
.token {font-size:30px;color:#0d6efd;margin:15px 0;}
</style>
</head>

<body>

<div class="card">

<h2>✅ Appointment Confirmed</h2>

<p id="name"></p>
<p id="date"></p>
<p id="time"></p>

<div class="token" id="token"></div>

</div>

<script>

let params = new URLSearchParams(window.location.search);

document.getElementById("name").innerText = "Name: "+params.get("name");
document.getElementById("date").innerText = "Date: "+params.get("date");
document.getElementById("time").innerText = "Time: "+params.get("time");
document.getElementById("token").innerText = params.get("token");

</script>

</body>
</html>
