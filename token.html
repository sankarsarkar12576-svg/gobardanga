<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 🔷 Card */
.card{
width:90%;
max-width:360px;
background:white;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
overflow:hidden;
animation:fadeIn 0.4s ease;
}

/* 🔷 Header */
.header{
padding:16px;
text-align:center;
color:white;
font-size:18px;
font-weight:600;
}

.green{background:linear-gradient(135deg,#28a745,#4cd964);}
.red{background:linear-gradient(135deg,#dc3545,#ff6b6b);}

/* 🔷 Body */
.body{
padding:20px;
text-align:center;
}

/* 🔷 Token */
.token{
font-size:48px;
font-weight:700;
color:#0d6efd;
margin:10px 0;
letter-spacing:2px;
}

/* 🔷 Info */
.info{
text-align:left;
font-size:14px;
margin-top:15px;
}

.info div{
margin:8px 0;
padding:10px;
background:#f7f9fc;
border-radius:10px;
}

/* 🔷 Button */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0d6efd,#3a8bfd);
color:white;
font-size:16px;
font-weight:600;
box-shadow:0 4px 12px rgba(13,110,253,0.3);
}

button:active{
transform:scale(0.97);
}

/* 🔷 Animation */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<div id="statusBar" class="header">Token Status</div>

<div class="body">

<div class="token" id="token">--</div>

<div class="info">
<div><b>👤 Name:</b> <span id="name"></span></div>
<div><b>📞 Phone:</b> <span id="phone"></span></div>
<div><b>🏥 Clinic:</b> <span id="clinic"></span></div>
<div><b>📅 Date:</b> <span id="date"></span></div>
<div><b>⏰ Time:</b> <span id="time"></span></div>
</div>

<button onclick="goHome()">⬅ Back to Home</button>

</div>

</div>

<script>

// 🔥 Load data from localStorage
let data = JSON.parse(localStorage.getItem("tokenData"));

// ❌ No token case
if(!data){

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
background:#eef2f7;
">

<div style="
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:85%;
max-width:320px;
">

<h2 style="color:#dc3545;">❌ No Active Token</h2>

<p style="font-size:14px;color:#666;">
Please book an appointment first
</p>

<button onclick="goHome()" style="
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
font-size:15px;
">
Go Booking
</button>

</div>
</div>
`;

throw new Error("No token");
}

// ✅ Set data
document.getElementById("token").innerText = data.token;
document.getElementById("name").innerText = data.name;
document.getElementById("phone").innerText = data.phone;
document.getElementById("clinic").innerText = data.clinic;
document.getElementById("date").innerText = data.date;
document.getElementById("time").innerText = data.time;

// 🔥 Status check
let today = new Date();
let bookingDate = new Date(data.date);

let bar = document.getElementById("statusBar");

if(bookingDate < today){
bar.classList.add("red");
bar.innerText = "❌ Appointment Expired";
}else{
bar.classList.add("green");
bar.innerText = "✅ Active Token";
}

// 🔙 Back
function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
